<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="pantherGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pantherGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#404040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g transform="translate(200, 200)">
    <!-- Neck/Lower head base -->
    <path d="M -80 120 Q -100 100 -110 70 Q -115 40 -110 10 Q -105 -20 -90 -50 L -70 -40 Q -80 -10 -75 20 Q -70 50 -60 80 Q -55 100 -50 120 Z" 
          fill="#000000" />
    
    <!-- Back of head -->
    <path d="M -90 -50 Q -100 -80 -95 -110 Q -90 -130 -75 -145 Q -60 -155 -40 -160 Q -15 -163 10 -160 Q 35 -157 55 -148 Q 75 -138 88 -120" 
          fill="url(#pantherGrad1)" />
    
    <!-- Top left ear -->
    <path d="M -75 -145 Q -85 -155 -90 -170 Q -92 -185 -85 -195 Q -78 -200 -68 -198 Q -58 -195 -53 -185 Q -50 -175 -52 -165 Q -55 -155 -62 -150 Z" 
          fill="#000000" />
    <path d="M -75 -165 Q -78 -175 -75 -185 Q -70 -190 -65 -187 Q -62 -180 -65 -170 Z" 
          fill="#2a2a2a" />
    
    <!-- Top right ear -->
    <path d="M 55 -148 Q 65 -160 75 -172 Q 85 -182 95 -185 Q 105 -187 112 -180 Q 118 -172 117 -160 Q 115 -148 108 -140 Q 100 -135 90 -135 Q 80 -138 72 -142 Z" 
          fill="#000000" />
    <path d="M 85 -160 Q 90 -170 95 -175 Q 100 -177 103 -172 Q 105 -165 102 -155 Q 98 -150 93 -148 Z" 
          fill="#2a2a2a" />
    
    <!-- Main head mass -->
    <ellipse cx="-20" cy="-40" rx="85" ry="95" fill="url(#pantherGrad1)" transform="rotate(-10 -20 -40)" />
    
    <!-- Forehead ridge -->
    <path d="M -40 -100 Q -20 -115 5 -120 Q 30 -122 50 -115 Q 65 -108 75 -95" 
          fill="none" stroke="#404040" stroke-width="3" opacity="0.6" />
    
    <!-- Upper muzzle/snout -->
    <path d="M 88 -120 Q 105 -105 120 -85 Q 135 -65 145 -40 Q 150 -20 148 0 Q 145 20 135 35" 
          fill="url(#pantherGrad2)" />
    
    <!-- Nose bridge highlight -->
    <path d="M 100 -90 Q 115 -80 125 -65 Q 132 -50 135 -35" 
          fill="none" stroke="#505050" stroke-width="4" opacity="0.5" />
    
    <!-- Nose -->
    <path d="M 145 -40 Q 155 -45 165 -42 Q 172 -38 175 -30 Q 177 -20 172 -12 Q 167 -5 158 -3 Q 148 -2 140 -8 Q 135 -15 135 -25 Q 137 -35 145 -40 Z" 
          fill="#1a1a1a" />
    <ellipse cx="155" cy="-22" rx="8" ry="10" fill="#0a0a0a" />
    
    <!-- Upper lip/muzzle -->
    <path d="M 135 35 Q 125 50 110 60 Q 90 68 70 68 Q 45 65 25 55 Q 5 43 -10 25" 
          fill="#000000" />
    
    <!-- Mouth opening -->
    <path d="M 158 -3 Q 155 5 148 12 Q 138 20 125 25 Q 108 30 90 30 Q 70 28 52 22 Q 35 15 20 5" 
          fill="#0a0a0a" />
    
    <!-- Lower jaw -->
    <path d="M 20 5 Q 0 -5 -15 -10 Q -35 -12 -50 -5 Q -65 5 -72 20 Q -75 35 -70 50 Q -62 65 -48 75 Q -30 85 -8 88 Q 15 88 38 82 Q 60 75 78 63" 
          fill="url(#pantherGrad1)" />
    
    <!-- Chin highlight -->
    <path d="M -10 35 Q 5 42 22 45 Q 38 45 52 40" 
          fill="none" stroke="#303030" stroke-width="3" opacity="0.4" />
    
    <!-- Cheek highlight -->
    <path d="M -70 -10 Q -55 -5 -40 -8 Q -25 -12 -15 -22" 
          fill="none" stroke="#404040" stroke-width="4" opacity="0.5" />
    
    <!-- Eye socket/brow ridge -->
    <path d="M -45 -75 Q -35 -85 -20 -88 Q -5 -88 8 -82 Q 18 -75 22 -65 Q 25 -50 20 -35 Q 12 -20 -2 -12 Q -18 -8 -35 -12 Q -48 -18 -55 -32 Q -58 -48 -52 -62 Q -48 -70 -45 -75 Z" 
          fill="#1a1a1a" />
    
    <!-- Eye white -->
    <ellipse cx="-15" cy="-50" rx="20" ry="25" fill="#2a2a2a" transform="rotate(-15 -15 -50)" />
    
    <!-- Iris -->
    <ellipse cx="-12" cy="-48" rx="14" ry="18" fill="#FFA500" transform="rotate(-15 -12 -48)" />
    
    <!-- Pupil -->
    <ellipse cx="-10" cy="-48" rx="6" ry="12" fill="#000000" transform="rotate(-15 -10 -48)" />
    
    <!-- Eye highlight -->
    <ellipse cx="-8" cy="-55" rx="4" ry="5" fill="#FFD700" opacity="0.8" />
    <circle cx="-6" cy="-53" r="2" fill="#FFFFFF" opacity="0.9" />
    
    <!-- Muscle definition lines -->
    <path d="M -35 -30 Q -25 -25 -12 -25 Q 2 -26 12 -32" 
          fill="none" stroke="#404040" stroke-width="2" opacity="0.6" />
    <path d="M 30 -80 Q 45 -70 58 -55 Q 68 -40 73 -22" 
          fill="none" stroke="#404040" stroke-width="2.5" opacity="0.5" />
    
    <!-- Whisker dots -->
    <circle cx="95" cy="15" r="3" fill="#1a1a1a" />
    <circle cx="105" cy="20" r="3" fill="#1a1a1a" />
    <circle cx="110" cy="10" r="2.5" fill="#1a1a1a" />
    <circle cx="100" cy="5" r="2.5" fill="#1a1a1a" />
    <circle cx="90" cy="25" r="2.5" fill="#1a1a1a" />
    
    <!-- Whiskers -->
    <line x1="95" y1="15" x2="170" y2="0" stroke="#e0e0e0" stroke-width="1.5" opacity="0.8" />
    <line x1="105" y1="20" x2="180" y2="15" stroke="#e0e0e0" stroke-width="1.5" opacity="0.8" />
    <line x1="110" y1="10" x2="185" y2="-5" stroke="#e0e0e0" stroke-width="1.2" opacity="0.7" />
    <line x1="100" y1="5" x2="175" y2="-10" stroke="#e0e0e0" stroke-width="1.2" opacity="0.7" />
    <line x1="90" y1="25" x2="165" y2="25" stroke="#e0e0e0" stroke-width="1.2" opacity="0.7" />
    
    <!-- Teeth hints -->
    <path d="M 125 25 L 122 32 L 125 32 Z" fill="#f0f0f0" opacity="0.9" />
    <path d="M 115 28 L 112 35 L 115 35 Z" fill="#f0f0f0" opacity="0.9" />
    <path d="M 105 28 L 102 35 L 105 35 Z" fill="#f0f0f0" opacity="0.85" />
    
    <!-- Lower teeth -->
    <path d="M 40 20 L 37 14 L 40 14 Z" fill="#e8e8e8" opacity="0.85" />
    <path d="M 30 22 L 27 16 L 30 16 Z" fill="#e8e8e8" opacity="0.85" />
    
    <!-- Nostril -->
    <ellipse cx="155" cy="-22" rx="4" ry="6" fill="#000000" />
  </g>
</svg>